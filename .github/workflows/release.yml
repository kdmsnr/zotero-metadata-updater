name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release assets
        run: npm run build

      - name: Verify release files
        run: |
          ls -lh .scaffold/build
          test -f .scaffold/build/metadata-updater.xpi
          test -f .scaffold/build/update.json
          test -f .scaffold/build/update-beta.json

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            .scaffold/build/metadata-updater.xpi
            .scaffold/build/update.json
            .scaffold/build/update-beta.json
